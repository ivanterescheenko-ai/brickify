name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Check imports
        run: python -c "from backend.providers.factory import get_provider, SUPPORTED_PROVIDERS; from backend.agents.decomposer import decompose_device; from backend.agents.writer import generate_guide; from backend.agents.researcher import enrich_bom; print('Backend imports OK')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
